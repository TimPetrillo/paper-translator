name: Feature request
description: 建议新功能或体验改进
title: '[Feature]: '
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 请描述用户场景，而不只是实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私影响
      options:
        - label: 我已说明此功能是否会新增数据收集、权限或外部请求。
          required: true
