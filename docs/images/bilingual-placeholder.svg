<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">论文双语翻译截图占位图</title>
  <desc id="desc">等待替换为真实论文页面双语翻译截图。</desc>
  <rect width="1200" height="620" rx="24" fill="#eef3f1"/>
  <rect x="70" y="42" width="1060" height="536" rx="12" fill="#fff" stroke="#d0dcd7" stroke-width="2"/>
  <circle cx="99" cy="70" r="7" fill="#ef7770"/><circle cx="122" cy="70" r="7" fill="#e8bd5d"/><circle cx="145" cy="70" r="7" fill="#67bb7b"/>
  <rect x="184" y="57" width="840" height="26" rx="13" fill="#f1f5f3"/>
  <text x="600" y="141" text-anchor="middle" font-size="28" font-weight="700" fill="#1c2924" font-family="Georgia,serif">An Example Academic Paper</text>
  <text x="600" y="172" text-anchor="middle" font-size="13" fill="#708079" font-family="sans-serif">Author and affiliation metadata remains unchanged</text>
  <g font-family="Georgia,serif" fill="#33423c" font-size="15">
    <text x="146" y="226">Abstract — This placeholder demonstrates the original English paragraph on a paper page.</text>
    <text x="146" y="316">The extension preserves document structure while processing visible text nodes in chunks.</text>
    <text x="146" y="406">Mathematical expressions, references, URLs, DOI values, and source code are skipped.</text>
  </g>
  <g font-family="sans-serif" fill="#146b53" font-size="15">
    <text x="162" y="262">摘要——此占位图展示论文页面中的英文原文与中文译文。</text>
    <text x="162" y="352">扩展在分块处理可见文本节点时保留文档结构。</text>
    <text x="162" y="442">数学表达式、参考文献、URL、DOI 与源代码将被跳过。</text>
  </g>
  <g stroke="#3ca080" stroke-width="3"><line x1="146" y1="240" x2="146" y2="270"/><line x1="146" y1="330" x2="146" y2="360"/><line x1="146" y1="420" x2="146" y2="450"/></g>
  <text x="600" y="535" text-anchor="middle" font-size="13" fill="#77867f" font-family="sans-serif">Bilingual page screenshot placeholder — replace before release</text>
