<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="850" viewBox="0 0 1440 850" role="img" aria-labelledby="title desc">
  <title id="title">Paper Translator 双语翻译效果</title>
  <desc id="desc">学术论文网页中英文原文与中文译文按段落对照显示，右上角展示 Paper Translator 弹窗。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#18352e" flood-opacity=".14"/>
    </filter>
    <style>
      .ui { font-family: Inter, "Segoe UI", Arial, sans-serif; }
      .paper { font-family: Georgia, "Times New Roman", serif; }
      .zh { font-family: "Microsoft YaHei", "PingFang SC", sans-serif; }
      .line { stroke: #dfe8e4; stroke-width: 8; stroke-linecap: round; }
      .copy { fill: #29332f; font-size: 17px; }
      .translation { fill: #247c68; font-size: 17px; }
    </style>
  </defs>

  <rect width="1440" height="850" fill="#edf3f0"/>
  <rect x="30" y="24" width="1380" height="802" rx="16" fill="#fff" filter="url(#shadow)"/>

  <rect x="30" y="24" width="1380" height="62" rx="16" fill="#f7faf8"/>
  <path d="M30 70h1380v16H30z" fill="#f7faf8"/>
  <circle cx="61" cy="55" r="7" fill="#ef776f"/>
  <circle cx="84" cy="55" r="7" fill="#efbd58"/>
  <circle cx="107" cy="55" r="7" fill="#67bd7c"/>
  <rect x="165" y="39" width="980" height="32" rx="8" fill="#fff" stroke="#d9e4df"/>
  <text x="187" y="61" class="ui" font-size="14" fill="#66756f">paper.example.org/article/demo</text>

  <rect x="30" y="86" width="1380" height="48" fill="#b31b1b"/>
  <text x="65" y="118" class="paper" font-size="25" fill="#fff">arXiv</text>
  <text x="1260" y="116" class="ui" font-size="13" fill="#fff">Download PDF</text>

  <rect x="30" y="134" width="265" height="692" fill="#fafbf9"/>
  <text x="86" y="201" class="ui" font-size="14" font-weight="700" fill="#66736d">CONTENTS</text>
  <text x="86" y="245" class="ui" font-size="15" fill="#27332e">Abstract</text>
  <text x="86" y="282" class="ui" font-size="15" fill="#27332e">1  Introduction</text>
  <text x="86" y="319" class="ui" font-size="15" fill="#27332e">2  Method</text>
  <text x="86" y="356" class="ui" font-size="15" fill="#27332e">3  Experiments</text>
  <text x="86" y="393" class="ui" font-size="15" fill="#27332e">4  Conclusion</text>
  <text x="86" y="430" class="ui" font-size="15" fill="#27332e">References</text>

  <g transform="translate(360 176)">
    <text x="0" y="0" class="paper" font-size="30" font-weight="700" fill="#17221e">Efficient Scientific Document Translation</text>
    <text x="0" y="39" class="paper" font-size="17" fill="#708079">A. Researcher · B. Scholar · C. Scientist</text>
    <line x1="0" y1="65" x2="870" y2="65" stroke="#e2e9e6"/>

    <text x="0" y="111" class="paper" font-size="24" font-weight="700" fill="#17221e">Abstract</text>
    <text x="0" y="151" class="paper copy">
      <tspan x="0" dy="0">Large language models provide a practical approach to translating scientific</tspan>
      <tspan x="0" dy="29">documents while preserving terminology, citations, and document structure.</tspan>
      <tspan x="0" dy="29">This study evaluates translation quality across several research domains.</tspan>
    </text>

    <g transform="translate(0 246)">
      <rect x="0" y="0" width="850" height="116" rx="5" fill="#f2faf7"/>
      <rect x="0" y="0" width="4" height="116" rx="2" fill="#18a77e"/>
      <text x="22" y="31" class="zh translation">
        <tspan x="22" dy="0">大语言模型为科学文献翻译提供了一种切实可行的方法，同时能够保留</tspan>
        <tspan x="22" dy="30">专业术语、引用信息与文档结构。本研究对多个学科领域的翻译质量</tspan>
        <tspan x="22" dy="30">进行了系统评估。</tspan>
      </text>
    </g>

    <text x="0" y="414" class="paper" font-size="24" font-weight="700" fill="#17221e">1. Introduction</text>
    <text x="0" y="454" class="paper copy">
      <tspan x="0" dy="0">Reading academic papers in a second language remains time-consuming.</tspan>
      <tspan x="0" dy="29">A paragraph-level bilingual layout helps readers compare the source and</tspan>
      <tspan x="0" dy="29">translation without losing equations, links, or surrounding context.</tspan>
    </text>

    <g transform="translate(0 550)">
      <rect x="0" y="0" width="850" height="116" rx="5" fill="#f2faf7"/>
      <rect x="0" y="0" width="4" height="116" rx="2" fill="#18a77e"/>
      <text x="22" y="31" class="zh translation">
        <tspan x="22" dy="0">使用第二语言阅读学术论文通常较为耗时。段落级双语布局可帮助读者</tspan>
        <tspan x="22" dy="30">对照原文与译文，同时保留公式、链接及其上下文，从而提升论文阅读</tspan>
        <tspan x="22" dy="30">的连贯性与效率。</tspan>
      </text>
    </g>
  </g>

  <g transform="translate(1084 154)" filter="url(#shadow)">
    <rect width="296" height="354" rx="13" fill="#f8fbf9" stroke="#d7e4de"/>
    <rect x="18" y="18" width="42" height="42" rx="11" fill="#16866b"/>
    <text x="39" y="47" class="zh" font-size="24" text-anchor="middle" fill="#fff">译</text>
    <text x="72" y="38" class="ui" font-size="17" font-weight="700" fill="#14221d">Paper Translator</text>
    <text x="72" y="57" class="zh" font-size="12" fill="#6d7c76">论文翻译控制面板</text>
    <rect x="18" y="79" width="260" height="105" rx="10" fill="#fff" stroke="#d8e5df"/>
    <text x="31" y="103" class="zh" font-size="13" font-weight="700" fill="#21302a">API 配置</text>
    <rect x="218" y="91" width="47" height="22" rx="11" fill="#fff0d7"/>
    <text x="241.5" y="106" class="zh" font-size="10" font-weight="700" text-anchor="middle" fill="#9b681b">未配置</text>
    <text x="31" y="128" class="zh" font-size="11" fill="#62736c">请在网页设置中填写 API Key、地址和模型。</text>
    <rect x="31" y="143" width="234" height="28" rx="6" fill="#eef6f2" stroke="#b8d2c8"/>
    <text x="148" y="162" class="zh" font-size="12" font-weight="700" text-anchor="middle" fill="#08765b">打开配置</text>

    <rect x="18" y="197" width="260" height="58" rx="10" fill="#fff" stroke="#d8e5df"/>
    <text x="31" y="221" class="zh" font-size="13" font-weight="700" fill="#17231e">准备就绪</text>
    <rect x="31" y="235" width="234" height="5" rx="3" fill="#e2ece8"/>

    <rect x="18" y="268" width="122" height="38" rx="7" fill="#8cbdaf"/>
    <rect x="156" y="268" width="122" height="38" rx="7" fill="#faecea"/>
    <text x="79" y="292" class="zh" font-size="12" font-weight="700" text-anchor="middle" fill="#fff">翻译当前页面</text>
    <text x="217" y="292" class="zh" font-size="12" font-weight="700" text-anchor="middle" fill="#cf8e87">停止</text>
    <rect x="18" y="316" width="260" height="27" rx="6" fill="#f8fbf9" stroke="#c8dad3"/>
    <text x="148" y="334" class="zh" font-size="11" text-anchor="middle" fill="#26352f">恢复页面原文</text>
  </g>
</svg>
